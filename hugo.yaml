baseURL: http://localhost:9876/academy/
title: Exoscale Academy
canonifyurls: true
ignoreLogs: ['warning-goldmark-raw-html']

params:
  buildCondition: examples

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  hugoVersion:
    extended: true
    min: 0.156.0
  imports:

    # used to source the base theme for academy.
    - path: github.com/layer5io/academy-theme
      disable: false
